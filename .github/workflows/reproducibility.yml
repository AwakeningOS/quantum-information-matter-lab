name: Reproducibility

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  raw-log-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check bootstrap raw logs
        run: python scripts/check_raw_logs.py
      - name: Materialize PR28 Q-cell trace shards
        if: ${{ github.head_ref == 'qcell-phenomenon-map-wide-observation' || github.ref_name == 'qcell-phenomenon-map-wide-observation' }}
        run: |
          cd scripts/quantum_observation
          python qcell_phenomenon_map_trace_export.py \
            --seed 20260709 \
            --trace-dir ../../data/quantum_observation/qcell_phenomenon_map_wide_observation_seed20260709_traces
          python qcell_untamed_situation_observation_v0.py \
            --seed 20260709 \
            --out-jsonl ../../data/quantum_observation/qcell_untamed_situation_observation_v0_seed20260709.jsonl \
            --summary-csv ../../data/quantum_observation/qcell_untamed_situation_observation_v0_seed20260709_summary.csv \
            --manifest ../../data/quantum_observation/qcell_untamed_situation_observation_v0_seed20260709_manifest.json
          cd ../..
          count=$(find data/quantum_observation/qcell_phenomenon_map_wide_observation_seed20260709_traces -name '*.jsonl' | wc -l)
          rows=$(find data/quantum_observation/qcell_phenomenon_map_wide_observation_seed20260709_traces -name '*.jsonl' -print0 | xargs -0 cat | wc -l)
          echo "trace shard count=$count"
          echo "trace row count=$rows"
          test "$count" -eq 48
          test "$rows" -eq 2688
          untamed_rows=$(cat data/quantum_observation/qcell_untamed_situation_observation_v0_seed20260709.jsonl | wc -l)
          echo "untamed situation rows=$untamed_rows"
          test "$untamed_rows" -eq 54
      - name: Commit PR28 Q-cell trace shards
        if: ${{ github.head_ref == 'qcell-phenomenon-map-wide-observation' || github.ref_name == 'qcell-phenomenon-map-wide-observation' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quantum_observation/qcell_phenomenon_map_wide_observation_seed20260709_traces
          git add data/quantum_observation/qcell_untamed_situation_observation_v0_seed20260709.jsonl
          git add data/quantum_observation/qcell_untamed_situation_observation_v0_seed20260709_summary.csv
          git add data/quantum_observation/qcell_untamed_situation_observation_v0_seed20260709_manifest.json
          if git diff --cached --quiet; then
            echo "No trace changes to commit."
          else
            git status --short
            git commit -m "Materialize untamed Q-cell observation data"
            git pull --rebase origin qcell-phenomenon-map-wide-observation
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:qcell-phenomenon-map-wide-observation
          fi
