<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Q-Cell Absorb v1 - Battle Readability</title>
<style>
  :root{--bg:#070916;--panel:#111832dd;--line:#8cb8ff33;--text:#eef4ff;--muted:#9aaccc;--cyan:#55d7ff;--green:#69f0ae;--yellow:#ffd166;--red:#ff6b8a;--purple:#b58cff}
  *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 0%,#27317866,transparent 33%),linear-gradient(135deg,#050610,#0b1024 60%,#070916);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  header{padding:14px 18px;border-bottom:1px solid var(--line);background:#0004} h1{font-size:21px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}
  main{display:grid;grid-template-columns:minmax(620px,1fr) 390px;gap:12px;padding:12px;max-width:1450px;margin:auto}.stage,.card{border:1px solid var(--line);background:var(--panel);border-radius:16px;box-shadow:0 18px 70px #0007}.stage{overflow:hidden;position:relative}canvas{display:block;width:100%;height:620px;background:#050918cc}.side{display:flex;flex-direction:column;gap:10px}.card{padding:12px}h2{font-size:15px;margin:0 0 8px}.big{font-size:17px;font-weight:900}.muted{color:var(--muted);font-size:12px;line-height:1.45}.banner{padding:12px;border-radius:14px;background:linear-gradient(135deg,#123252,#162047);border:1px solid #75c8ff44}.banner.good{background:linear-gradient(135deg,#0d473b,#163348)}.banner.warn{background:linear-gradient(135deg,#5c3f0e,#302744)}.banner.bad{background:linear-gradient(135deg,#5b1528,#271631)}
  .buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b9cbff44;border-radius:12px;padding:10px 8px;background:linear-gradient(180deg,#34478e,#18214b);color:var(--text);font-weight:800;cursor:pointer}button:hover{filter:brightness(1.15)}button:active{transform:translateY(1px)}button.good{background:linear-gradient(180deg,#19916f,#0e5148)}button.warn{background:linear-gradient(180deg,#b77a24,#604019)}button.bad{background:linear-gradient(180deg,#b13a5c,#58203a)}button:disabled{opacity:.45;cursor:not-allowed}.hint{font-size:11px;color:#c9d7ffcc;margin-top:3px}
  .row{display:flex;justify-content:space-between;gap:8px;font-size:12px;margin:5px 0}.val{font-variant-numeric:tabular-nums;font-weight:800}.bar{height:9px;border-radius:999px;background:#fff1;overflow:hidden;margin-bottom:6px}.fill{height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--green))}.fill.bad{background:linear-gradient(90deg,var(--red),#ffb25c)}.fill.warn{background:linear-gradient(90deg,var(--yellow),#ff7b72)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pill{display:inline-block;border:1px solid #b9cbff44;background:#6d8cff22;border-radius:999px;padding:3px 7px;font-size:11px;margin:2px}.log{height:152px;overflow:auto;background:#0004;border-radius:12px;padding:9px;font-size:12px;line-height:1.45}.codex{max-height:96px;overflow:auto;font-size:11px;color:#d8e2ff}.delta{font-weight:900}.up{color:var(--red)}.down{color:var(--green)}.same{color:var(--muted)}@media(max-width:1000px){main{grid-template-columns:1fr}canvas{height:540px}}
</style>
</head>
<body>
<header><h1>Qセル・アブソーブ v1</h1><div class="sub">勝て。取り込め。変質しろ。v1は「押したら何が起きたか」を見える化した読みやすさ版。</div></header>
<main>
  <section class="stage"><canvas id="view" width="1000" height="620"></canvas></section>
  <aside class="side">
    <section id="mission" class="card banner"></section>
    <section class="card"><h2>行動</h2><div class="buttons">
      <div><button id="wave">相関波</button><div class="hint">敵の fatigue/damage/pressure を上げる</div></div>
      <div><button id="shell">境界殻</button><div class="hint">自分を守る。ただし閉じて餓えやすい</div></div>
      <div><button class="good" id="purge">毒排出</button><div class="hint">toxicity/pressure を下げる。energy消費</div></div>
      <div><button class="warn" id="rest">休ませる</button><div class="hint">fatigue/bias を下げる。攻めは止まる</div></div>
      <div><button class="bad" id="flash">暴走発光</button><div class="hint">強攻撃。自分のoverdrive riskも上がる</div></div>
      <div><button class="good" id="absorb">吸収</button><div class="hint">敵が崩れた後、traitを取り込む</div></div>
    </div></section>
    <section id="prediction" class="card"></section>
    <section class="grid2"><div id="pstats" class="card"></div><div id="estats" class="card"></div></section>
    <section class="card"><h2>結果ログ</h2><div id="log" class="log"></div></section>
    <section class="card"><h2>反応図鑑</h2><div id="codex" class="codex">まだ未記録</div></section>
  </aside>
</main>
<script>
const P={lag1:13,lag2:27,tickMs:80,decay:.035};
const TRAITS={toxin_resistance:{jp:'毒耐性',load:.28},repair_core:{jp:'回復核',load:.36},pressure_wave:{jp:'過圧波',load:.42},boundary_shell:{jp:'境界殻',load:.34},overdrive_light:{jp:'暴走光',load:.62},absorption_mouth:{jp:'吸収口',load:.45},resonance_core:{jp:'共鳴核',load:.48},waste_gate:{jp:'排出口',load:.30}};
const WAVES=['left_to_right','right_to_left','simultaneous','double_pulse','rebound_wave','damped_oscillatory','spiral'];
const COMP={left_to_right:{left_to_right:.42,right_to_left:-.40,simultaneous:.12,double_pulse:.30,rebound_wave:-.10,damped_oscillatory:.20,spiral:.28},right_to_left:{left_to_right:-.40,right_to_left:.42,simultaneous:.12,double_pulse:-.08,rebound_wave:.22,damped_oscillatory:.20,spiral:.28},simultaneous:{left_to_right:.12,right_to_left:.12,simultaneous:.35,double_pulse:.10,rebound_wave:.05,damped_oscillatory:.18,spiral:.22},double_pulse:{left_to_right:.30,right_to_left:-.08,simultaneous:.10,double_pulse:.40,rebound_wave:.16,damped_oscillatory:.24,spiral:.34},rebound_wave:{left_to_right:-.10,right_to_left:.22,simultaneous:.05,double_pulse:.16,rebound_wave:.34,damped_oscillatory:.16,spiral:.36},damped_oscillatory:{left_to_right:.20,right_to_left:.20,simultaneous:.18,double_pulse:.24,rebound_wave:.16,damped_oscillatory:.38,spiral:.30},spiral:{left_to_right:.28,right_to_left:.28,simultaneous:.22,double_pulse:.34,rebound_wave:.36,damped_oscillatory:.30,spiral:.45}};
const $=id=>document.getElementById(id), clamp=(x,a=0,b=1)=>Math.max(a,Math.min(b,x)), fmt=x=>Number(x).toFixed(3), pick=a=>a[Math.floor(Math.random()*a.length)];
let tick=0, feedback={text:'まずは相関波で敵Qセルを崩せ',type:''}, codex=[];
class Cell{
  constructor(name,side,traits,wave){this.name=name;this.side=side;this.energy=.7;this.tox=.06;this.press=.45;this.damage=.02;this.fatigue=.03;this.bias=.02;this.boundary=1;this.open=.6;this.overRisk=.08;this.assim=.62;this.coherence=.78;this.reach=.78;this.traits=traits;this.wave=wave;this.links={MC:0,CR:0,RW:0};this.events=[];this.shell=0;this.rest=0;this.envelope=0;this.flash=0}
  health(){let e=this.energy>=.6&&this.energy<=.8?1:Math.max(0,1-Math.abs(this.energy-.7)/.45),t=clamp(1-this.tox/.5),p=this.press>=.3&&this.press<=.6?1:Math.max(0,1-Math.abs(this.press-.45)/.42),d=clamp(1-this.damage/.5);return clamp((e+t+p+d+this.boundary)/5)}
  state(){if((this.envelope>.72||this.damage>.4)&&this.energy>.6)return'暴走';if(this.health()<.25)return'休眠';if(this.energy<.4)return'飢餓';if(this.tox>.35)return'毒化';if(this.press>.7)return'過圧';if(this.fatigue>.4)return'疲労';if(this.energy<.55)return'空腹';return'元気'}
  absorbable(){return this.health()<.25||this.boundary<.25||this.tox>.75||this.press>.85||this.damage>.7||this.state()==='暴走'}
  waveEvent(pattern=this.wave,origin='M',s=.1){let push=(t,k,a)=>this.events.push({t,k,a}); if(pattern==='simultaneous'){push(0,'MC',s);push(0,'CR',s);push(0,'RW',s)} else if(pattern==='right_to_left'||origin==='W'){push(0,'RW',s);push(P.lag1,'CR',s*.76);push(P.lag2,'MC',s*.56)} else if(pattern==='double_pulse'){push(0,'MC',s);push(P.lag1,'CR',s*.76);push(P.lag2,'RW',s*.56);push(18,'MC',s*.62);push(31,'CR',s*.48);push(45,'RW',s*.34)} else if(pattern==='rebound_wave'){push(0,'MC',s);push(P.lag1,'CR',s*.7);push(P.lag2,'RW',s*.5);push(39,'RW',s*.52);push(52,'CR',s*.36)} else if(pattern==='spiral'){push(0,'MC',s*1.05);push(7,'CR',s*.9);push(14,'RW',s*.75);push(21,'MC',s*.48)} else {push(0,'MC',s);push(P.lag1,'CR',s*.76);push(P.lag2,'RW',s*.56)}}
  step(){let toxEx=Math.max(0,this.tox-.2),prsEx=Math.max(0,this.press-.6),engDef=Math.max(0,.6-this.energy);let target=clamp(.6-.9*toxEx+.7*engDef-.5*prsEx-.4*this.fatigue);if(this.shell>0)target=Math.min(target,.18);if(this.rest>0)target=Math.min(.72,target+.08);this.open+=(target-this.open)*.22;let g=P.decay+.08*this.tox+.04*this.press+.04*this.fatigue+.03*this.bias;['MC','CR','RW'].forEach(k=>this.links[k]*=(1-clamp(g,.02,.22)));this.events.forEach(e=>e.t--);let due=this.events.filter(e=>e.t<=0);this.events=this.events.filter(e=>e.t>0);due.forEach(e=>this.links[e.k]=clamp(this.links[e.k]+e.a,0,.2));let sum=this.links.MC+this.links.CR+this.links.RW;this.envelope=clamp(this.envelope*.94+Math.max(0,sum-.18)*.35+this.overRisk*.01);let repair=this.traits.includes('repair_core')?.018:0,toxR=this.traits.includes('toxin_resistance')?.018:0,waste=this.traits.includes('waste_gate')?.02:0;this.energy=clamp(this.energy-.004-.006*this.fatigue+(this.rest>0?.006:0));this.tox=clamp(this.tox-.003-toxR-waste+.006*this.open*(this.side==='enemy'?.7:.2));this.press=clamp(this.press+.002+.006*this.open-.01*waste-(this.rest>0?.008:0));this.damage=clamp(this.damage-.006-repair+.006*this.tox+.005*this.envelope);this.fatigue=clamp(this.fatigue*.985+.003*sum+.008*this.envelope-(this.rest>0?.075:0));this.bias=clamp(this.bias*.992);this.boundary=clamp(this.boundary-.004*this.damage-.004*this.press+(this.shell>0?.012:.003));this.shell=Math.max(0,this.shell-1);this.rest=Math.max(0,this.rest-1);this.flash=Math.max(0,this.flash-.05)}
}
let player=new Cell('自分Qセル','player',['boundary_shell','resonance_core','waste_gate'],'left_to_right');
let enemy=new Cell('敵Qセル','enemy',['toxin_resistance','overdrive_light','absorption_mouth'],'rebound_wave');enemy.overRisk=.2;enemy.assim=.48;
function snap(c){return{h:c.health(),e:c.energy,t:c.tox,p:c.press,d:c.damage,f:c.fatigue,b:c.boundary,o:c.envelope}}
function diff(before,after){let keys=[['h','health'],['f','fatigue'],['d','damage'],['p','pressure'],['t','toxicity'],['b','boundary'],['o','overdrive']];return keys.map(([k,n])=>[n,after[k]-before[k]]).filter(x=>Math.abs(x[1])>.006).map(([n,v])=>`${n} <span class="delta ${v>0?'up':'down'}">${v>0?'+':''}${fmt(v)}</span>`).join(' / ')||'<span class="same">大きな変化なし</span>'}
function comp(a,b){return COMP[a]?.[b]??0}
function predict(){let trait=enemy.traits[0],load=TRAITS[trait].load,c=comp(player.wave,enemy.wave),inst=player.fatigue+player.tox+player.damage+player.overRisk-player.assim,pressure=clamp(load+inst-c,0,1.5);let label=pressure<.35?'安定融合しやすい':pressure<.65?'変異しやすい':pressure<.9?'拒絶リスク高い':'暴走リスク高い';let cls=pressure<.35?'good':pressure<.65?'warn':'bad';return{trait,load,c,inst,pressure,label,cls}}
function attack(a,d,mode='normal'){let s=mode==='flash'?.15:.095*(a.coherence+.35),before=snap(d);a.waveEvent(a.wave,'M',s);let reach=a.reach+(a.traits.includes('resonance_core')?.18:0),dis=s*reach*(mode==='flash'?1.85:1);d.fatigue=clamp(d.fatigue+dis*.46);d.damage=clamp(d.damage+dis*.25);d.press=clamp(d.press+dis*.2);if(a.traits.includes('pressure_wave'))d.press=clamp(d.press+.08);if(a.traits.includes('overdrive_light'))d.envelope=clamp(d.envelope+.12);if(mode==='flash'){a.fatigue=clamp(a.fatigue+.18);a.overRisk=clamp(a.overRisk+.08);a.damage=clamp(a.damage+.035);a.flash=1}return diff(before,snap(d))}
function shell(c){let b=snap(c);c.shell=18;c.energy=clamp(c.energy-.025);c.fatigue=clamp(c.fatigue+.035);c.boundary=clamp(c.boundary+.08);c.waveEvent('damped_oscillatory','M',.055);return diff(b,snap(c))}
function purge(c){let b=snap(c);c.tox=clamp(c.tox-.14);c.press=clamp(c.press-.07);c.energy=clamp(c.energy-.045);c.waveEvent('right_to_left','W',.06);return diff(b,snap(c))}
function rest(c){let b=snap(c);c.rest=18;c.fatigue=clamp(c.fatigue-.11);c.bias=clamp(c.bias-.045);c.envelope=clamp(c.envelope-.08);return diff(b,snap(c))}
function enemyTurn(){if(enemy.absorbable())return;let msg;if(enemy.tox>.3||enemy.press>.7)msg='敵は毒排出';else if(enemy.health()<.45&&Math.random()<.35)msg='敵は休息';else if(enemy.overRisk>.25&&Math.random()<.3)msg='敵の暴走発光: '+attack(enemy,player,'flash');else msg='敵の相関波: '+attack(enemy,player);if(msg==='敵は毒排出')msg+=': '+purge(enemy);if(msg==='敵は休息')msg+=': '+rest(enemy);log(msg)}
function act(kind){let msg='',cls='';if(kind==='wave'){msg='相関波が敵へ命中: '+attack(player,enemy);cls='good'}if(kind==='shell'){msg='境界殻を展開: '+shell(player);cls='warn'}if(kind==='purge'){msg='毒排出: '+purge(player);cls='good'}if(kind==='rest'){msg='休ませた: '+rest(player);cls='good'}if(kind==='flash'){msg='暴走発光: '+attack(player,enemy,'flash')+' / 自分にも負荷';cls='bad'}feedback={text:msg,type:cls};log(msg);enemyTurn()}
function absorb(){if(!enemy.absorbable()){feedback={text:'まだ吸収不可。敵のhealth/boundaryをもっと崩せ',type:'warn'};log(feedback.text);return}let pr=predict(),out=pr.pressure<.35?'安定融合':pr.pressure<.65?'変異融合':pr.pressure<.9?'拒絶反応':'暴走化';if(pr.c>.32&&player.health()>.45&&pr.pressure<.75)out='希少波獲得';if(pr.c<-.28&&player.fatigue<.3&&player.damage<.25)out='干渉変異';apply(pr.trait,out,pr);let rec=`${TRAITS[pr.trait].jp} / ${player.wave}×${enemy.wave} -> ${out}`;codex.unshift(rec);feedback={text:`吸収成功: ${rec} / 圧=${fmt(pr.pressure)}`,type:out==='安定融合'||out==='希少波獲得'?'good':out==='暴走化'||out==='拒絶反応'?'bad':'warn'};log(feedback.text);spawnEnemy()}
function apply(trait,out,pr){if(out!=='拒絶反応'&&!player.traits.includes(trait))player.traits.push(trait);if(out==='安定融合'){player.assim=clamp(player.assim+.08);player.energy=clamp(player.energy+.05);player.fatigue=clamp(player.fatigue+.04)}else if(out==='変異融合'){player.assim=clamp(player.assim+.02-pr.pressure*.02);player.overRisk=clamp(player.overRisk+.04);player.fatigue=clamp(player.fatigue+.11);if(pr.c>.1)player.wave='double_pulse'}else if(out==='希少波獲得'){player.wave=pr.c>.36?'spiral':'damped_oscillatory';player.coherence=clamp(player.coherence+.1);player.reach=clamp(player.reach+.07);player.fatigue=clamp(player.fatigue+.12)}else if(out==='干渉変異'){player.wave=pick(['simultaneous','rebound_wave','spiral']);player.damage=clamp(player.damage+.08);player.overRisk=clamp(player.overRisk+.1)}else if(out==='拒絶反応'){player.damage=clamp(player.damage+.16);player.fatigue=clamp(player.fatigue+.18);player.boundary=clamp(player.boundary-.12)}else{player.overRisk=clamp(player.overRisk+.22);player.envelope=clamp(player.envelope+.45);player.fatigue=clamp(player.fatigue+.24);player.damage=clamp(player.damage+.12);player.wave='rebound_wave'}if(trait==='toxin_resistance')player.tox=clamp(player.tox-.08);if(trait==='repair_core')player.damage=clamp(player.damage-.1);if(trait==='boundary_shell')player.boundary=clamp(player.boundary+.12);if(trait==='overdrive_light')player.overRisk=clamp(player.overRisk+.12);if(trait==='absorption_mouth')player.assim=clamp(player.assim+.05);player.waveEvent(player.wave,'C',.14)}
function spawnEnemy(){let keys=Object.keys(TRAITS),ts=[];while(ts.length<3){let t=pick(keys);if(!ts.includes(t))ts.push(t)}enemy=new Cell('敵Qセル','enemy',ts,pick(WAVES));enemy.energy=.62+Math.random()*.22;enemy.tox=.04+Math.random()*.18;enemy.press=.36+Math.random()*.22;enemy.overRisk=.06+Math.random()*.22;enemy.assim=.4+Math.random()*.34}
function log(m){let el=$('log'),d=document.createElement('div');d.innerHTML=`T${tick}: ${m}`;el.prepend(d)}
function bar(n,v,bad=false){let c=bad?'bad':v>.7?'warn':'';return `<div class=row><span>${n}</span><span class=val>${fmt(v)}</span></div><div class=bar><div class="fill ${c}" style="width:${clamp(v)*100}%"></div></div>`}
function stat(c){return `<h2>${c.name} / ${c.state()}</h2>${bar('health',c.health())}${bar('energy',c.energy)}${bar('toxicity',c.tox,true)}${bar('pressure',c.press,c.press>.65)}${bar('damage',c.damage,true)}${bar('fatigue',c.fatigue,true)}${bar('boundary',c.boundary)}<div class=row><span>wave</span><b>${c.wave}</b></div><div>${c.traits.map(t=>`<span class=pill>${TRAITS[t].jp}</span>`).join('')}</div>`}
function renderUI(){let absorbable=enemy.absorbable(),pr=predict();$('absorb').disabled=!absorbable;$('mission').className='card banner '+(absorbable?'good':player.health()<.35?'bad':'');$('mission').innerHTML=`<div class=big>${absorbable?'吸収可能！':'目的: 敵Qセルの恒常性を崩せ'}</div><div class=muted>${absorbable?'今なら敵traitを取り込める。ただし吸収前に予測を見る。':'相関波で敵のfatigue/damage/pressureを上げる。危なくなったら休ませる。'}</div><hr style="border-color:#ffffff22"><div>${feedback.text}</div>`;$('prediction').className='card banner '+pr.cls;$('prediction').innerHTML=`<h2>吸収予測</h2><div class=big>${pr.label}</div><div class=muted>候補trait: ${TRAITS[pr.trait].jp}<br>吸収圧 = trait load ${fmt(pr.load)} + 自分の不安定性 ${fmt(pr.inst)} - 波相性 ${fmt(pr.c)} = <b>${fmt(pr.pressure)}</b></div>`;$('pstats').innerHTML=stat(player);$('estats').innerHTML=stat(enemy);$('codex').innerHTML=codex.length?codex.map(x=>`<div>${x}</div>`).join(''):'まだ未記録'}
function drawCell(c,x,y){let h=c.health(),pulse=1+Math.sin(tick*.1)*.025*(1-c.fatigue),r=(78+22*c.energy+16*c.press-18*c.damage)*pulse,j=c.state()==='暴走'?Math.sin(tick*.9)*5:c.tox>.35?Math.sin(tick*.55)*2:0;ctx.save();ctx.translate(x+j,y);let g=ctx.createRadialGradient(0,0,r*.1,0,0,r);g.addColorStop(0,`rgba(${90+c.tox*140},${235-c.tox*150},255,${.35+.5*h})`);g.addColorStop(1,`rgba(90,150,255,${.12+.35*c.boundary})`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.lineWidth=4+8*(1-c.open);ctx.strokeStyle=c.state()==='暴走'?'#ff5aacdd':'#8fdcffbb';ctx.stroke();let nodes=[['M',-58,0],['C',-18,-18],['R',22,18],['W',60,0]],links=[['MC',0,1],['CR',1,2],['RW',2,3]];links.forEach(([k,a,b])=>{let A=nodes[a],B=nodes[b],n=c.links[k];ctx.lineCap='round';ctx.lineWidth=5+n*95;ctx.strokeStyle=`rgba(95,225,255,${.18+n*6})`;ctx.beginPath();ctx.moveTo(A[1],A[2]);ctx.lineTo(B[1],B[2]);ctx.stroke()});nodes.forEach(nd=>{ctx.fillStyle='#eefcff';ctx.beginPath();ctx.arc(nd[1],nd[2],10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#071024';ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(nd[0],nd[1],nd[2])});ctx.fillStyle='#eef4ff';ctx.font='bold 16px system-ui';ctx.textAlign='center';ctx.fillText(c.name,0,-r-24);ctx.fillStyle=c.state()==='暴走'?'#ff78b4':'#b9c8ee';ctx.font='13px system-ui';ctx.fillText(`${c.state()} / ${c.wave}`,0,r+26);ctx.restore()}
const canvas=$('view'),ctx=canvas.getContext('2d');function draw(){ctx.clearRect(0,0,1000,620);ctx.fillStyle='#ffffff08';for(let i=0;i<70;i++)ctx.fillRect((i*137+tick)%1000,i*83%620,2,2);drawCell(player,270,310);drawCell(enemy,730,310);ctx.setLineDash([8,8]);ctx.strokeStyle='#ffffff30';ctx.beginPath();ctx.moveTo(405,310);ctx.lineTo(595,310);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#dce8ffcc';ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('ボタンを押すと、右上の結果欄に「何が変わったか」が出る',500,62);renderUI()}
['wave','shell','purge','rest','flash'].forEach(id=>$(id).onclick=()=>act(id));$('absorb').onclick=absorb;function loop(){tick++;player.step();enemy.step();if(tick%75===0&&!enemy.absorbable())enemyTurn();draw()}log('v1起動: まず相関波を押して、敵の変化ログを見る');setInterval(loop,P.tickMs);draw();
</script>
