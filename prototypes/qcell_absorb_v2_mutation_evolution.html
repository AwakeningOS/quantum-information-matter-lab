<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Q-Cell Absorb v2 - Mutation Evolution</title>
<style>
:root{--bg:#060817;--panel:#111832e8;--line:#8cb8ff33;--text:#eef4ff;--muted:#9aaccc;--cyan:#55d7ff;--green:#69f0ae;--yellow:#ffd166;--red:#ff6b8a;--purple:#b58cff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 18% 0%,#303b9066,transparent 34%),radial-gradient(circle at 80% 5%,#17664e55,transparent 30%),linear-gradient(135deg,#050610,#0b1024 60%,#070916);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{padding:14px 18px;border-bottom:1px solid var(--line);background:#0005}h1{font-size:21px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}main{display:grid;grid-template-columns:minmax(620px,1fr) 410px;gap:12px;padding:12px;max-width:1480px;margin:auto}.stage,.card{border:1px solid var(--line);background:var(--panel);border-radius:16px;box-shadow:0 18px 70px #0008}.stage{overflow:hidden}.side{display:flex;flex-direction:column;gap:10px}canvas{display:block;width:100%;height:640px;background:#050918cc}.card{padding:12px}h2{font-size:15px;margin:0 0 8px}.big{font-size:18px;font-weight:950}.muted{color:var(--muted);font-size:12px;line-height:1.45}.banner{padding:13px;border-radius:14px;background:linear-gradient(135deg,#123252,#162047);border:1px solid #75c8ff44}.banner.good{background:linear-gradient(135deg,#0d473b,#163348)}.banner.warn{background:linear-gradient(135deg,#5c3f0e,#302744)}.banner.bad{background:linear-gradient(135deg,#5b1528,#271631)}.banner.evo{background:linear-gradient(135deg,#3d236d,#173b56);border-color:#d8a6ff77}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}button{border:1px solid #b9cbff44;border-radius:12px;padding:10px 8px;background:linear-gradient(180deg,#34478e,#18214b);color:var(--text);font-weight:850;cursor:pointer}button:hover{filter:brightness(1.15)}button:active{transform:translateY(1px)}button.good{background:linear-gradient(180deg,#19916f,#0e5148)}button.warn{background:linear-gradient(180deg,#b77a24,#604019)}button.bad{background:linear-gradient(180deg,#b13a5c,#58203a)}button:disabled{opacity:.42;cursor:not-allowed}.hint{font-size:11px;color:#c9d7ffcc;margin-top:3px}.row{display:flex;justify-content:space-between;gap:8px;font-size:12px;margin:5px 0}.val{font-variant-numeric:tabular-nums;font-weight:850}.bar{height:9px;border-radius:999px;background:#fff1;overflow:hidden;margin-bottom:6px}.fill{height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--green))}.fill.bad{background:linear-gradient(90deg,var(--red),#ffb25c)}.fill.warn{background:linear-gradient(90deg,var(--yellow),#ff7b72)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pill{display:inline-block;border:1px solid #b9cbff44;background:#6d8cff22;border-radius:999px;padding:3px 7px;font-size:11px;margin:2px}.organ{background:#34ffc422}.log,.codex{height:134px;overflow:auto;background:#0005;border-radius:12px;padding:9px;font-size:12px;line-height:1.45}.codex{height:88px}.delta{font-weight:900}.up{color:var(--red)}.down{color:var(--green)}.same{color:var(--muted)}.score{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.score div{background:#0004;border:1px solid #ffffff1f;border-radius:10px;padding:7px;text-align:center}.score b{display:block;font-size:18px}@media(max-width:1020px){main{grid-template-columns:1fr}canvas{height:560px}}
</style>
</head>
<body>
<header><h1>Qセル・アブソーブ v2</h1><div class="sub">v2: 変異・進化・培養失敗を実装。吸収すると形態・器官・波・次戦性能が変わる。</div></header>
<main>
<section class="stage"><canvas id="view" width="1000" height="640"></canvas></section>
<aside class="side">
  <section id="mission" class="card banner"></section>
  <section class="card"><h2>行動</h2><div class="buttons">
    <div><button id="wave">相関波</button><div class="hint">敵を疲労・損傷・過圧へ</div></div>
    <div><button id="shell">境界殻</button><div class="hint">守る。閉じすぎると餓える</div></div>
    <div><button class="good" id="purge">毒排出</button><div class="hint">毒/圧を下げる。エネルギー消費</div></div>
    <div><button class="warn" id="rest">休眠回復</button><div class="hint">疲労・暴走を下げる</div></div>
    <div><button class="bad" id="flash">暴走発光</button><div class="hint">強攻撃。自分も壊れる</div></div>
    <div><button class="good" id="absorb">吸収・変質</button><div class="hint">敵崩壊後、traitを取り込む</div></div>
    <div><button class="warn" id="stabilize">安定化処置</button><div class="hint">吸収後の不安定を下げる</div></div>
    <div><button class="bad" id="restart">再培養</button><div class="hint">培養失敗/やり直し</div></div>
  </div></section>
  <section id="event" class="card banner"></section>
  <section id="prediction" class="card"></section>
  <section class="card"><h2>進化状態</h2><div id="evo"></div></section>
  <section class="grid2"><div id="pstats" class="card"></div><div id="estats" class="card"></div></section>
  <section class="card"><h2>ログ</h2><div id="log" class="log"></div></section>
  <section class="card"><h2>変異図鑑</h2><div id="codex" class="codex">まだ未記録</div></section>
</aside>
</main>
<script>
const P={tickMs:80,lag1:13,lag2:27,decay:.035};
const TRAITS={toxin_resistance:{jp:'毒耐性',load:.28,org:'毒ろ過膜'},repair_core:{jp:'回復核',load:.36,org:'修復核'},pressure_wave:{jp:'過圧波',load:.42,org:'圧縮腺'},boundary_shell:{jp:'境界殻',load:.34,org:'外殻'},overdrive_light:{jp:'暴走光',load:.62,org:'発光核'},absorption_mouth:{jp:'吸収口',load:.45,org:'吸収孔'},resonance_core:{jp:'共鳴核',load:.48,org:'共鳴心'},waste_gate:{jp:'排出口',load:.30,org:'排出口'}};
const WAVES=['left_to_right','right_to_left','simultaneous','double_pulse','rebound_wave','damped_oscillatory','spiral'];
const COMP={left_to_right:{left_to_right:.42,right_to_left:-.40,simultaneous:.12,double_pulse:.30,rebound_wave:-.10,damped_oscillatory:.20,spiral:.28},right_to_left:{left_to_right:-.40,right_to_left:.42,simultaneous:.12,double_pulse:-.08,rebound_wave:.22,damped_oscillatory:.20,spiral:.28},simultaneous:{left_to_right:.12,right_to_left:.12,simultaneous:.35,double_pulse:.10,rebound_wave:.05,damped_oscillatory:.18,spiral:.22},double_pulse:{left_to_right:.30,right_to_left:-.08,simultaneous:.10,double_pulse:.40,rebound_wave:.16,damped_oscillatory:.24,spiral:.34},rebound_wave:{left_to_right:-.10,right_to_left:.22,simultaneous:.05,double_pulse:.16,rebound_wave:.34,damped_oscillatory:.16,spiral:.36},damped_oscillatory:{left_to_right:.20,right_to_left:.20,simultaneous:.18,double_pulse:.24,rebound_wave:.16,damped_oscillatory:.38,spiral:.30},spiral:{left_to_right:.28,right_to_left:.28,simultaneous:.22,double_pulse:.34,rebound_wave:.36,damped_oscillatory:.30,spiral:.45}};
const FORMS={幼体:{desc:'まだ未分化。すべてが中途半端。',bonus:{}},境界型:{desc:'硬い外殻。守るが餓えやすい。',bonus:{boundary:.12,open:-.05}},共鳴型:{desc:'相関波が強い。攻めが派手だが疲れる。',bonus:{coh:.12,reach:.1,fatigue:.04}},回復型:{desc:'損傷を戻しやすい。長期戦向き。',bonus:{repair:.02,assim:.06}},暴走型:{desc:'火力は高いが培養失敗に近い。',bonus:{over:.18,coh:.1}},吸収型:{desc:'traitを取り込みやすいが毒も入りやすい。',bonus:{assim:.12,open:.06}},休眠殻型:{desc:'低活動で守る。勝ちにくいが死ににくい。',bonus:{boundary:.16,coh:-.05}}};
const $=id=>document.getElementById(id), clamp=(x,a=0,b=1)=>Math.max(a,Math.min(b,x)), fmt=x=>Number(x).toFixed(3), pick=a=>a[Math.floor(Math.random()*a.length)], comp=(a,b)=>COMP[a]?.[b]??0;
let tick=0, gameOver=false, codex=[], lastEvent={type:'',title:'まず敵を崩せ',body:'相関波で敵のfatigue/damage/pressureを上げる。敵が崩れたら吸収できる。'};
class Cell{constructor(name,side,traits,wave){this.name=name;this.side=side;this.energy=.70;this.tox=.06;this.press=.45;this.damage=.02;this.fatigue=.03;this.bias=.02;this.boundary=1;this.open=.6;this.overRisk=.08;this.assim=.62;this.coherence=.78;this.reach=.78;this.form='幼体';this.organs=[];this.traits=traits;this.wave=wave;this.links={MC:0,CR:0,RW:0};this.events=[];this.shell=0;this.rest=0;this.envelope=0;this.flash=0;this.absorbs=0;this.generation=1;this.repairBonus=0}
 health(){let e=this.energy>=.6&&this.energy<=.8?1:Math.max(0,1-Math.abs(this.energy-.7)/.45),t=clamp(1-this.tox/.5),p=this.press>=.3&&this.press<=.6?1:Math.max(0,1-Math.abs(this.press-.45)/.42),d=clamp(1-this.damage/.5);return clamp((e+t+p+d+this.boundary)/5)}
 state(){if((this.envelope>.72||this.damage>.4)&&this.energy>.6)return'暴走';if(this.health()<.20||this.damage>.82||this.boundary<.12)return'培養失敗';if(this.health()<.25)return'休眠';if(this.energy<.4)return'飢餓';if(this.tox>.35)return'毒化';if(this.press>.7)return'過圧';if(this.fatigue>.4)return'疲労';if(this.energy<.55)return'空腹';return'元気'}
 absorbable(){return this.health()<.25||this.boundary<.25||this.tox>.75||this.press>.85||this.damage>.7||this.state()==='暴走'}
 waveEvent(pattern=this.wave,origin='M',s=.1){let push=(t,k,a)=>this.events.push({t,k,a});if(pattern==='simultaneous'){push(0,'MC',s);push(0,'CR',s);push(0,'RW',s)}else if(pattern==='right_to_left'||origin==='W'){push(0,'RW',s);push(P.lag1,'CR',s*.76);push(P.lag2,'MC',s*.56)}else if(pattern==='double_pulse'){push(0,'MC',s);push(P.lag1,'CR',s*.76);push(P.lag2,'RW',s*.56);push(18,'MC',s*.62);push(31,'CR',s*.48);push(45,'RW',s*.34)}else if(pattern==='rebound_wave'){push(0,'MC',s);push(P.lag1,'CR',s*.7);push(P.lag2,'RW',s*.5);push(39,'RW',s*.52);push(52,'CR',s*.36)}else if(pattern==='spiral'){push(0,'MC',s*1.05);push(7,'CR',s*.9);push(14,'RW',s*.75);push(21,'MC',s*.48);push(28,'CR',s*.38)}else{push(0,'MC',s);push(P.lag1,'CR',s*.76);push(P.lag2,'RW',s*.56)}}
 step(){let toxEx=Math.max(0,this.tox-.2),prsEx=Math.max(0,this.press-.6),engDef=Math.max(0,.6-this.energy);let target=clamp(.6-.9*toxEx+.7*engDef-.5*prsEx-.4*this.fatigue+(this.form==='吸収型'?.05:0));if(this.shell>0)target=Math.min(target,.18);if(this.rest>0)target=Math.min(.72,target+.08);this.open+=(target-this.open)*.22;let g=P.decay+.08*this.tox+.04*this.press+.04*this.fatigue+.03*this.bias;['MC','CR','RW'].forEach(k=>this.links[k]*=(1-clamp(g,.02,.22)));this.events.forEach(e=>e.t--);let due=this.events.filter(e=>e.t<=0);this.events=this.events.filter(e=>e.t>0);due.forEach(e=>this.links[e.k]=clamp(this.links[e.k]+e.a,0,.2));let sum=this.links.MC+this.links.CR+this.links.RW;this.envelope=clamp(this.envelope*.94+Math.max(0,sum-.18)*.35+this.overRisk*.01);let repair=(this.traits.includes('repair_core')?.018:0)+this.repairBonus,toxR=this.traits.includes('toxin_resistance')?.018:0,waste=this.traits.includes('waste_gate')?.02:0;this.energy=clamp(this.energy-.004-.006*this.fatigue+(this.rest>0?.006:0));this.tox=clamp(this.tox-.003-toxR-waste+.006*this.open*(this.side==='enemy'?.7:.2));this.press=clamp(this.press+.002+.006*this.open-.01*waste-(this.rest>0?.008:0));this.damage=clamp(this.damage-.006-repair+.006*this.tox+.005*this.envelope);this.fatigue=clamp(this.fatigue*.985+.003*sum+.008*this.envelope-(this.rest>0?.075:0));this.bias=clamp(this.bias*.992);this.boundary=clamp(this.boundary-.004*this.damage-.004*this.press+(this.shell>0?.012:.003));this.shell=Math.max(0,this.shell-1);this.rest=Math.max(0,this.rest-1);this.flash=Math.max(0,this.flash-.04)}
}
let player,enemy;function newPlayer(){player=new Cell('自分Qセル','player',['boundary_shell','resonance_core','waste_gate'],'left_to_right');enemySpawn();gameOver=false;codex=[];lastEvent={type:'',title:'再培養開始',body:'今度は吸収後の変化が見た目と形態に出る。'};log('再培養した')}
function enemySpawn(){let keys=Object.keys(TRAITS),ts=[];while(ts.length<3){let t=pick(keys);if(!ts.includes(t))ts.push(t)}enemy=new Cell('敵Qセル','enemy',ts,pick(WAVES));enemy.energy=.62+Math.random()*.22;enemy.tox=.04+Math.random()*.18;enemy.press=.36+Math.random()*.22;enemy.overRisk=.06+Math.random()*.22;enemy.assim=.4+Math.random()*.34;enemy.form=pick(['境界型','共鳴型','回復型','暴走型','吸収型'])}
function snap(c){return{h:c.health(),e:c.energy,t:c.tox,p:c.press,d:c.damage,f:c.fatigue,b:c.boundary,o:c.envelope}}
function diff(b,a){let ks=[['h','health'],['f','fatigue'],['d','damage'],['p','pressure'],['t','toxicity'],['b','boundary'],['o','overdrive']];return ks.map(([k,n])=>[n,a[k]-b[k]]).filter(x=>Math.abs(x[1])>.006).map(([n,v])=>`${n} <span class="delta ${v>0?'up':'down'}">${v>0?'+':''}${fmt(v)}</span>`).join(' / ')||'<span class="same">大きな変化なし</span>'}
function predict(){let trait=enemy.traits[0],load=TRAITS[trait].load,c=comp(player.wave,enemy.wave),inst=player.fatigue+player.tox+player.damage+player.overRisk-player.assim,pressure=clamp(load+inst-c,0,1.5);let label=pressure<.35?'安定融合しやすい':pressure<.65?'変異しやすい':pressure<.9?'拒絶リスク高い':'暴走リスク高い';return{trait,load,c,inst,pressure,label}}
function attack(a,d,mode='normal'){let s=mode==='flash'?.16:.1*(a.coherence+.35),before=snap(d);a.waveEvent(a.wave,'M',s);let reach=a.reach+(a.traits.includes('resonance_core')?.18:0)+(a.form==='共鳴型'?.12:0),dis=s*reach*(mode==='flash'?1.95:1);d.fatigue=clamp(d.fatigue+dis*.50);d.damage=clamp(d.damage+dis*.28);d.press=clamp(d.press+dis*.22);if(a.traits.includes('pressure_wave'))d.press=clamp(d.press+.08);if(a.traits.includes('overdrive_light'))d.envelope=clamp(d.envelope+.14);if(mode==='flash'){a.fatigue=clamp(a.fatigue+.20);a.overRisk=clamp(a.overRisk+.10);a.damage=clamp(a.damage+.04);a.flash=1}return diff(before,snap(d))}
function shell(c){let b=snap(c);c.shell=18;c.energy=clamp(c.energy-.03);c.fatigue=clamp(c.fatigue+.04);c.boundary=clamp(c.boundary+.10);c.waveEvent('damped_oscillatory','M',.06);return diff(b,snap(c))}
function purge(c){let b=snap(c);c.tox=clamp(c.tox-.15);c.press=clamp(c.press-.08);c.energy=clamp(c.energy-.05);c.waveEvent('right_to_left','W',.06);return diff(b,snap(c))}
function rest(c){let b=snap(c);c.rest=20;c.fatigue=clamp(c.fatigue-.13);c.bias=clamp(c.bias-.05);c.envelope=clamp(c.envelope-.12);return diff(b,snap(c))}
function stabilize(){if(gameOver)return;let b=snap(player);player.fatigue=clamp(player.fatigue-.18);player.envelope=clamp(player.envelope-.18);player.overRisk=clamp(player.overRisk-.08);player.damage=clamp(player.damage-.04);player.energy=clamp(player.energy-.04);lastEvent={type:'good',title:'安定化処置',body:'吸収後の暴走リスクを下げた。代わりにenergyを消費。 '+diff(b,snap(player))};log(lastEvent.body)}
function enemyTurn(){if(enemy.absorbable()||gameOver)return;let m;if(enemy.tox>.3||enemy.press>.7)m='敵は毒排出: '+purge(enemy);else if(enemy.health()<.45&&Math.random()<.35)m='敵は休眠回復: '+rest(enemy);else if(enemy.overRisk>.25&&Math.random()<.3)m='敵の暴走発光: '+attack(enemy,player,'flash');else m='敵の相関波: '+attack(enemy,player);log(m)}
function action(kind){if(gameOver)return;let m='',type='';if(kind==='wave'){m='相関波: '+attack(player,enemy);type='good'}if(kind==='shell'){m='境界殻: '+shell(player);type='warn'}if(kind==='purge'){m='毒排出: '+purge(player);type='good'}if(kind==='rest'){m='休眠回復: '+rest(player);type='good'}if(kind==='flash'){m='暴走発光: '+attack(player,enemy,'flash')+' / 自分も損傷';type='bad'}lastEvent={type,title:'行動結果',body:m};log(m);enemyTurn();checkFail()}
function checkFail(){if(player.state()==='培養失敗'){gameOver=true;lastEvent={type:'bad',title:'培養失敗',body:'Qセルが崩壊した。再培養でやり直し。原因: health低下 / damage過多 / boundary破れ'};log(lastEvent.body)}}
function absorb(){if(gameOver)return;if(!enemy.absorbable()){lastEvent={type:'warn',title:'まだ吸収不可',body:'敵の恒常性をもっと崩す必要がある。'};log(lastEvent.body);return}let pr=predict(),old={form:player.form,wave:player.wave,organs:player.organs.slice(),traits:player.traits.slice(),gen:player.generation};let out=pr.pressure<.35?'安定融合':pr.pressure<.65?'変異融合':pr.pressure<.9?'拒絶反応':'暴走化';if(pr.c>.32&&player.health()>.45&&pr.pressure<.75)out='希少波獲得';if(pr.c<-.28&&player.fatigue<.3&&player.damage<.25)out='干渉変異';applyMutation(pr.trait,out,pr);let changes=[];if(old.form!==player.form)changes.push(`形態: ${old.form} → ${player.form}`);if(old.wave!==player.wave)changes.push(`波: ${old.wave} → ${player.wave}`);let newOrg=player.organs.filter(o=>!old.organs.includes(o));if(newOrg.length)changes.push(`新器官: ${newOrg.join(' / ')}`);let newTraits=player.traits.filter(t=>!old.traits.includes(t)).map(t=>TRAITS[t].jp);if(newTraits.length)changes.push(`trait獲得: ${newTraits.join(' / ')}`);if(!changes.length)changes.push('外見変化なし。ただし内部負荷が変わった。');let rec=`${out}: ${TRAITS[pr.trait].jp}吸収 / ${changes.join(' / ')}`;codex.unshift(rec);lastEvent={type:out==='暴走化'||out==='拒絶反応'?'bad':out==='変異融合'?'warn':'evo',title:`${out} 発生`,body:rec};log(rec);enemySpawn();checkFail()}
function applyMutation(trait,out,pr){if(out!=='拒絶反応'&&!player.traits.includes(trait))player.traits.push(trait);let organ=TRAITS[trait].org;if(out!=='拒絶反応'&&!player.organs.includes(organ))player.organs.push(organ);if(out==='安定融合'){player.assim=clamp(player.assim+.08);player.energy=clamp(player.energy+.06);player.fatigue=clamp(player.fatigue+.04)}else if(out==='変異融合'){player.assim=clamp(player.assim+.02-pr.pressure*.02);player.overRisk=clamp(player.overRisk+.05);player.fatigue=clamp(player.fatigue+.12);if(pr.c>.1)player.wave='double_pulse'}else if(out==='希少波獲得'){player.wave=pr.c>.36?'spiral':'damped_oscillatory';player.coherence=clamp(player.coherence+.12);player.reach=clamp(player.reach+.08);player.fatigue=clamp(player.fatigue+.12)}else if(out==='干渉変異'){player.wave=pick(['simultaneous','rebound_wave','spiral']);player.damage=clamp(player.damage+.08);player.overRisk=clamp(player.overRisk+.11)}else if(out==='拒絶反応'){player.damage=clamp(player.damage+.18);player.fatigue=clamp(player.fatigue+.20);player.boundary=clamp(player.boundary-.15)}else{player.overRisk=clamp(player.overRisk+.25);player.envelope=clamp(player.envelope+.50);player.fatigue=clamp(player.fatigue+.26);player.damage=clamp(player.damage+.14);player.wave='rebound_wave'}
 if(trait==='toxin_resistance')player.tox=clamp(player.tox-.09);if(trait==='repair_core'){player.damage=clamp(player.damage-.12);player.repairBonus+=.004}if(trait==='boundary_shell')player.boundary=clamp(player.boundary+.14);if(trait==='overdrive_light')player.overRisk=clamp(player.overRisk+.14);if(trait==='absorption_mouth')player.assim=clamp(player.assim+.07);player.absorbs++;player.generation++;evolve(out,trait,pr);player.waveEvent(player.wave,'C',.16)}
function evolve(out,trait,pr){let old=player.form;if(out==='暴走化')player.form='暴走型';else if(out==='希少波獲得'||trait==='resonance_core')player.form='共鳴型';else if(trait==='boundary_shell'||player.boundary>.9)player.form='境界型';else if(trait==='repair_core'||player.repairBonus>.006)player.form='回復型';else if(trait==='absorption_mouth')player.form='吸収型';else if(player.health()<.35&&player.boundary>.75)player.form='休眠殻型';else if(player.absorbs>=3&&old==='幼体')player.form='共鳴型';applyFormBonus(old,player.form)}
function applyFormBonus(oldF,newF){if(oldF===newF)return;let b=FORMS[newF].bonus||{};if(b.boundary)player.boundary=clamp(player.boundary+b.boundary);if(b.open)player.open=clamp(player.open+b.open);if(b.coh)player.coherence=clamp(player.coherence+b.coh);if(b.reach)player.reach=clamp(player.reach+b.reach);if(b.fatigue)player.fatigue=clamp(player.fatigue+b.fatigue);if(b.assim)player.assim=clamp(player.assim+b.assim);if(b.over)player.overRisk=clamp(player.overRisk+b.over);if(b.repair)player.repairBonus+=b.repair}
function renderUI(){let absorbable=enemy.absorbable(),pr=predict();$('absorb').disabled=!absorbable||gameOver;['wave','shell','purge','rest','flash','stabilize'].forEach(id=>$(id).disabled=gameOver);$('mission').className='card banner '+(gameOver?'bad':absorbable?'good':player.health()<.35?'bad':'');$('mission').innerHTML=`<div class=big>${gameOver?'培養失敗':absorbable?'吸収可能！':'目的: 敵Qセルを崩して吸収せよ'}</div><div class=muted>${gameOver?'再培養を押してやり直し。':'敵を休眠/暴走/境界破れに追い込む。吸収後は形態・器官・波が変わる。'}</div>`;$('event').className='card banner '+(lastEvent.type||'');$('event').innerHTML=`<div class=big>${lastEvent.title}</div><div class=muted>${lastEvent.body}</div>`;let cls=pr.pressure<.35?'good':pr.pressure<.65?'warn':'bad';$('prediction').className='card banner '+cls;$('prediction').innerHTML=`<h2>吸収予測</h2><div class=big>${pr.label}</div><div class=muted>候補trait: ${TRAITS[pr.trait].jp}<br>吸収圧 = load ${fmt(pr.load)} + 自分の不安定性 ${fmt(pr.inst)} - 波相性 ${fmt(pr.c)} = <b>${fmt(pr.pressure)}</b></div>`;$('evo').innerHTML=`<div class=score><div>世代<b>${player.generation}</b></div><div>吸収<b>${player.absorbs}</b></div><div>形態<b>${player.form}</b></div></div><p class=muted>${FORMS[player.form].desc}</p><div>${player.organs.map(o=>`<span class="pill organ">${o}</span>`).join('')||'<span class=muted>器官なし</span>'}</div>`;$('pstats').innerHTML=stat(player);$('estats').innerHTML=stat(enemy);$('codex').innerHTML=codex.length?codex.map(x=>`<div>${x}</div>`).join(''):'まだ未記録'}
function bar(n,v,bad=false){let c=bad?'bad':v>.7?'warn':'';return `<div class=row><span>${n}</span><span class=val>${fmt(v)}</span></div><div class=bar><div class="fill ${c}" style="width:${clamp(v)*100}%"></div></div>`}
function stat(c){return `<h2>${c.name} / ${c.state()}</h2>${bar('health',c.health())}${bar('energy',c.energy)}${bar('toxicity',c.tox,true)}${bar('pressure',c.press,c.press>.65)}${bar('damage',c.damage,true)}${bar('fatigue',c.fatigue,true)}${bar('boundary',c.boundary)}<div class=row><span>form</span><b>${c.form}</b></div><div class=row><span>wave</span><b>${c.wave}</b></div><div>${c.traits.map(t=>`<span class=pill>${TRAITS[t].jp}</span>`).join('')}</div>`}
function log(m){let el=$('log'),d=document.createElement('div');d.innerHTML=`T${tick}: ${m}`;el.prepend(d)}
const canvas=$('view'),ctx=canvas.getContext('2d');function drawCell(c,x,y){let h=c.health(),pulse=1+Math.sin(tick*.1)*.025*(1-c.fatigue),base=c.form==='境界型'?92:c.form==='休眠殻型'?74:c.form==='暴走型'?90:c.form==='吸収型'?86:80,r=(base+20*c.energy+15*c.press-18*c.damage)*pulse,j=c.state()==='暴走'?Math.sin(tick*.9)*5:c.tox>.35?Math.sin(tick*.55)*2:0;ctx.save();ctx.translate(x+j,y);let red=c.tox*150+(c.form==='暴走型'?90:0),green=235-c.tox*140,blue=c.form==='共鳴型'?255:230;let g=ctx.createRadialGradient(0,0,r*.1,0,0,r);g.addColorStop(0,`rgba(${90+red},${green},${blue},${.35+.5*h})`);g.addColorStop(1,`rgba(90,150,255,${.12+.35*c.boundary})`);ctx.fillStyle=g;ctx.beginPath();if(c.form==='境界型'){ctx.ellipse(0,0,r*1.08,r*.92,0,0,Math.PI*2)}else if(c.form==='吸収型'){ctx.ellipse(0,0,r*.92,r*1.08,0,0,Math.PI*2)}else{ctx.arc(0,0,r,0,Math.PI*2)}ctx.fill();ctx.lineWidth=4+8*(1-c.open)+(c.form==='境界型'?4:0);ctx.strokeStyle=c.state()==='暴走'||c.form==='暴走型'?'#ff5aacdd':'#8fdcffbb';ctx.stroke();if(c.organs.length){ctx.fillStyle='#9dffe499';for(let i=0;i<c.organs.length;i++){let a=i/c.organs.length*Math.PI*2+tick*.01;ctx.beginPath();ctx.arc(Math.cos(a)*r*.72,Math.sin(a)*r*.72,6,0,Math.PI*2);ctx.fill()}}
let nodes=[['M',-58,0],['C',-18,-18],['R',22,18],['W',60,0]],links=[['MC',0,1],['CR',1,2],['RW',2,3]];links.forEach(([k,a,b])=>{let A=nodes[a],B=nodes[b],n=c.links[k];ctx.lineCap='round';ctx.lineWidth=5+n*100;ctx.strokeStyle=`rgba(95,225,255,${.18+n*6})`;ctx.beginPath();ctx.moveTo(A[1],A[2]);ctx.lineTo(B[1],B[2]);ctx.stroke()});nodes.forEach(nd=>{ctx.fillStyle='#eefcff';ctx.beginPath();ctx.arc(nd[1],nd[2],10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#071024';ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(nd[0],nd[1],nd[2])});if(c.flash>0){ctx.strokeStyle=`rgba(255,90,180,${c.flash})`;ctx.lineWidth=8;ctx.beginPath();ctx.arc(0,0,r+18,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='#eef4ff';ctx.font='bold 16px system-ui';ctx.textAlign='center';ctx.fillText(c.name,0,-r-28);ctx.fillStyle=c.state()==='暴走'||c.form==='暴走型'?'#ff78b4':'#b9c8ee';ctx.font='13px system-ui';ctx.fillText(`${c.state()} / ${c.form}`,0,r+26);ctx.restore()}
function draw(){ctx.clearRect(0,0,1000,640);ctx.fillStyle='#ffffff08';for(let i=0;i<80;i++)ctx.fillRect((i*137+tick)%1000,i*83%640,2,2);drawCell(player,270,320);drawCell(enemy,730,320);ctx.setLineDash([8,8]);ctx.strokeStyle='#ffffff30';ctx.beginPath();ctx.moveTo(405,320);ctx.lineTo(595,320);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#dce8ffcc';ctx.font='13px system-ui';ctx.textAlign='center';ctx.fillText('吸収後は形態・器官・波が変わる。崩れすぎると培養失敗。',500,62);renderUI()}
['wave','shell','purge','rest','flash'].forEach(id=>$(id).onclick=()=>action(id));$('absorb').onclick=absorb;$('stabilize').onclick=stabilize;$('restart').onclick=newPlayer;function loop(){tick++;if(!gameOver){player.step();enemy.step();if(tick%75===0&&!enemy.absorbable())enemyTurn();checkFail()}draw()}newPlayer();setInterval(loop,P.tickMs);draw();
</script>
